<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Notifier Pro</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- Login View -->
    <div id="login-view" class="view" hidden>
      <div class="login-container">
        <svg class="github-logo" viewBox="0 0 16 16" width="48" height="48">
          <path
            fill="currentColor"
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
          />
        </svg>
        <h2>GitHub Notifier Pro</h2>
        <p id="login-subtitle">Choose your authentication method</p>

        <!-- Auth Method Selector -->
        <div class="auth-methods" id="auth-methods">
          <button class="auth-method-card" id="oauth-method">
            <div class="auth-method-content">
              <h3>Sign in with GitHub</h3>
              <p class="auth-method-desc">Secure Device Flow - no secrets needed</p>
            </div>
          </button>

          <div class="auth-method-divider">
            <span>OR</span>
          </div>

          <button class="auth-method-card" id="pat-method">
            <div class="auth-method-content">
              <h3>Use Personal Access Token</h3>
              <p class="auth-method-desc">Quick setup with manual token</p>
            </div>
          </button>
        </div>

        <!-- PAT Input Form (initially hidden) -->
        <div id="pat-input-form" class="pat-input-form" hidden>
          <label for="pat-input">Enter your Personal Access Token:</label>
          <input
            type="password"
            id="pat-input"
            class="pat-input"
            placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
            autocomplete="off"
            spellcheck="false"
          />
          <div class="pat-hint">
            <a
              href="https://github.com/settings/tokens/new?scopes=repo,notifications&description=GitHub%20Notifier%20Pro"
              target="_blank"
              rel="noopener noreferrer"
            >
              Generate a new token
            </a>
            with <code>repo</code> and <code>notifications</code> scopes
          </div>
          <div class="pat-actions">
            <button class="btn btn-secondary" id="pat-cancel-btn">Cancel</button>
            <button class="btn btn-primary" id="pat-login-btn">Connect</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Main View -->
    <div id="main-view" class="view" hidden>
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <div class="user-info">
            <span class="username" id="username"></span>
            <button class="btn-icon" id="settings-icon-btn" title="Settings">
              <svg viewBox="0 0 16 16" width="16" height="16">
                <path
                  fill="currentColor"
                  d="M8 0a8.2 8.2 0 0 1 .701.031C9.444.095 9.99.645 10.16 1.29l.288 1.107c.018.066.079.158.212.224.231.114.454.243.668.386.123.082.233.09.299.071l1.103-.303c.644-.176 1.392.021 1.82.63.27.385.506.792.704 1.218.315.675.111 1.422-.364 1.891l-.814.806c-.049.048-.098.147-.088.294.016.257.016.515 0 .772-.01.147.038.246.088.294l.814.806c.475.469.679 1.216.364 1.891a7.977 7.977 0 0 1-.704 1.217c-.428.61-1.176.807-1.82.63l-1.102-.302c-.067-.019-.177-.011-.3.071a5.909 5.909 0 0 1-.668.386c-.133.066-.194.158-.211.224l-.29 1.106c-.168.646-.715 1.196-1.458 1.26a8.006 8.006 0 0 1-1.402 0c-.743-.064-1.289-.614-1.458-1.26l-.289-1.106c-.018-.066-.079-.158-.212-.224a5.738 5.738 0 0 1-.668-.386c-.123-.082-.233-.09-.299-.071l-1.103.303c-.644.176-1.392-.021-1.82-.63a8.12 8.12 0 0 1-.704-1.218c-.315-.675-.111-1.422.363-1.891l.815-.806c.05-.048.098-.147.088-.294a6.214 6.214 0 0 1 0-.772c.01-.147-.038-.246-.088-.294l-.815-.806C.635 6.045.431 5.298.746 4.623a7.92 7.92 0 0 1 .704-1.217c.428-.61 1.176-.807 1.82-.63l1.102.302c.067.019.177.011.3-.071.214-.143.437-.272.668-.386.133-.066.194-.158.211-.224l.29-1.106C6.009.645 6.556.095 7.299.03 7.53.01 7.764 0 8 0Zm-.571 1.525c-.036.003-.108.036-.137.146l-.289 1.105c-.147.561-.549.967-.998 1.189-.173.086-.34.183-.5.29-.417.278-.97.423-1.529.27l-1.103-.303c-.109-.03-.175.016-.195.045-.22.312-.412.644-.573.99-.014.031-.021.11.059.19l.815.806c.411.406.562.957.53 1.456a4.709 4.709 0 0 0 0 .582c.032.499-.119 1.05-.53 1.456l-.815.806c-.081.08-.073.159-.059.19.162.346.353.677.573.989.02.03.085.076.195.046l1.102-.303c.56-.153 1.113-.008 1.53.27.161.107.328.204.501.29.447.222.85.629.997 1.189l.289 1.105c.029.109.101.143.137.146a6.6 6.6 0 0 0 1.142 0c.036-.003.108-.036.137-.146l.289-1.105c.147-.561.549-.967.998-1.189.173-.086.34-.183.5-.29.417-.278.97-.423 1.529-.27l1.103.303c.109.029.175-.016.195-.045.22-.313.411-.644.573-.99.014-.031.021-.11-.059-.19l-.815-.806c-.411-.406-.562-.957-.53-1.456a4.709 4.709 0 0 0 0-.582c-.032-.499.119-1.05.53-1.456l.815-.806c.081-.08.073-.159.059-.19a6.464 6.464 0 0 0-.573-.989c-.02-.03-.085-.076-.195-.046l-1.102.303c-.56.153-1.113.008-1.53-.27a4.44 4.44 0 0 0-.501-.29c-.447-.222-.85-.629-.997-1.189l-.289-1.105c-.029-.11-.101-.143-.137-.146a6.6 6.6 0 0 0-1.142 0ZM11 8a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM9.5 8a1.5 1.5 0 1 0-3.001.001A1.5 1.5 0 0 0 9.5 8Z"
                />
              </svg>
            </button>
          </div>
        </div>
        <div class="header-right">
          <span id="refresh-countdown" class="refresh-countdown"></span>
          <button id="refresh-btn" class="btn-icon" title="Refresh">
            <svg viewBox="0 0 16 16" width="16" height="16">
              <path fill="currentColor" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z" />
              <path
                fill="currentColor"
                d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"
              />
            </svg>
          </button>
          <button id="mark-all-btn" class="btn-icon" title="Mark all as read">
            <svg viewBox="0 0 16 16" width="16" height="16">
              <path
                fill="currentColor"
                d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0z"
              />
            </svg>
          </button>
        </div>
      </header>

      <!-- Notifications List -->
      <div id="notifications-container">
        <ul id="notifications-list" class="notifications-list"></ul>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state" hidden>
          <svg viewBox="0 0 16 16" width="32" height="32">
            <path
              fill="currentColor"
              d="M8 16a2 2 0 0 0 1.985-1.75c.017-.137-.097-.25-.235-.25h-3.5c-.138 0-.252.113-.235.25A2 2 0 0 0 8 16ZM3 5a5 5 0 0 1 10 0v2.947c0 .05.015.098.042.139l1.703 2.555A1.519 1.519 0 0 1 13.482 13H2.518a1.516 1.516 0 0 1-1.263-2.36l1.703-2.554A.255.255 0 0 0 3 7.947Zm5-3.5A3.5 3.5 0 0 0 4.5 5v2.947c0 .346-.102.683-.294.97l-1.703 2.556a.017.017 0 0 0-.003.01l.001.006c0 .002.002.004.004.006l.006.004.007.001h10.964l.007-.001.006-.004.004-.006.001-.007a.017.017 0 0 0-.003-.01l-1.703-2.554a1.745 1.745 0 0 1-.294-.97V5A3.5 3.5 0 0 0 8 1.5Z"
            />
          </svg>
          <p>No notifications yet</p>
        </div>
      </div>

      <!-- Settings View -->
      <div id="settings-view" class="view settings-view" hidden>
        <div class="settings-header">
          <button class="btn-icon" id="settings-back-btn" title="Back">
            <svg viewBox="0 0 16 16" width="16" height="16">
              <path
                fill="currentColor"
                d="M7.78 12.53a.75.75 0 0 1-1.06 0L2.47 8.28a.75.75 0 0 1 0-1.06l4.25-4.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042L4.81 7h7.44a.75.75 0 0 1 0 1.5H4.81l2.97 2.97a.75.75 0 0 1 0 1.06Z"
              />
            </svg>
          </button>
          <h3 class="settings-title">Settings</h3>
        </div>
        <div class="settings-content">
          <div class="setting-row">
            <span class="setting-account-name" id="settings-username">Loading...</span>
            <button class="btn btn-secondary btn-compact" id="settings-logout-btn">Sign Out</button>
          </div>

          <div class="setting-row">
            <label for="theme-select">Theme</label>
            <select id="theme-select" class="setting-select">
              <option value="light">Light</option>
              <option value="dark">Dark</option>
              <option value="system">System</option>
            </select>
          </div>

          <div class="setting-row">
            <label
              for="hover-cards-toggle"
              title="Show detailed notification information (author, comments, description) when hovering over items"
              >Hover Cards</label
            >
            <label class="toggle-switch">
              <input type="checkbox" id="hover-cards-toggle" />
            </label>
          </div>

          <div class="setting-row">
            <label for="desktop-notifications-toggle" title="Show system notifications for new GitHub notifications"
              >Desktop Notifications</label
            >
            <label class="toggle-switch">
              <input type="checkbox" id="desktop-notifications-toggle" />
            </label>
          </div>

          <div class="setting-row">
            <label for="popup-width-input">Width</label>
            <div class="width-controls">
              <button class="btn-icon width-btn" id="width-decrease" title="Decrease width">
                <svg viewBox="0 0 16 16" width="14" height="14">
                  <path
                    fill="currentColor"
                    d="M2 7.75A.75.75 0 0 1 2.75 7h10a.75.75 0 0 1 0 1.5h-10A.75.75 0 0 1 2 7.75z"
                  />
                </svg>
              </button>
              <input
                type="number"
                id="popup-width-input"
                class="width-input"
                min="400"
                max="800"
                step="10"
                value="400"
              />
              <span class="width-unit">px</span>
              <button class="btn-icon width-btn" id="width-increase" title="Increase width">
                <svg viewBox="0 0 16 16" width="14" height="14">
                  <path
                    fill="currentColor"
                    d="M8 2.75a.75.75 0 0 1 .75.75v4h4a.75.75 0 0 1 0 1.5h-4v4a.75.75 0 0 1-1.5 0v-4h-4a.75.75 0 0 1 0-1.5h4v-4A.75.75 0 0 1 8 2.75z"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer">
        <a href="https://github.com/notifications" target="_blank" rel="noopener noreferrer" id="open-github">
          Open GitHub Notifications
        </a>
      </footer>
    </div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
